# This file was created automatically with `jupyter-book init --gh-pages` 🪄 💚
# Ensure your GitHub Pages settings for this repository are set to deploy with **GitHub Actions**.

name: Jupyter Book (via myst) GitHub Pages Deploy
on:
  push:
    # Runs on pushes targeting the default branch
    branches: [main]
env:
  # `BASE_URL` determines, relative to the root of the domain, the URL that your site is served from.
  # E.g., if your site lives at `https://mydomain.org/myproject`, set `BASE_URL=/myproject`.
  # If, instead, your site lives at the root of the domain, at `https://mydomain.org`, set `BASE_URL=''`.
  # BASE_URL: /${{ github.event.repository.name }}
  BASE_URL: ''

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # cache: 'pip'
          # cache-dependency-path: requirements.txt
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt      
      - name: Install Jupyter Book (via myst)
        run: npm install -g jupyter-book

      # - name: Cache executed notebooks
      #   uses: actions/cache@v4
      #   with:
      #     path: _build/.jupyter_cache
      #     key: jupyter-cache-${{ runner.os }}-${{ hashFiles('requirements.txt', 'myst.yml', '**/*.ipynb', '**/*.md') }}
      #     restore-keys: |
      #       jupyter-cache-${{ runner.os }}-
      # - name: Cache myst templates
      #   uses: actions/cache@v4
      #   with:
      #     path: _build/templates
      #     key: myst-templates-${{ runner.os }}-${{ hashFiles('myst.yml') }}
      #     restore-keys: |
      #       myst-templates-${{ runner.os }}-

      - name: Build HTML Assets
        # env:
        #   NODE_OPTIONS: --max-old-space-size=4096
        # run: jupyter-book build --html --execute
        run: jupyter-book build --html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_build/html'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
